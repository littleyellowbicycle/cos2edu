<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色管理 - 苏格拉底AI教学系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }
        .avatar-preview-emoji {
            font-size: 48px;
        }
        .upload-area {
            border: 2px dashed #d1d5db;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #8b5cf6;
            background-color: #f5f3ff;
        }
        .upload-area.dragover {
            border-color: #8b5cf6;
            background-color: #ede9fe;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="gradient-bg shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <a href="/" class="text-white text-2xl font-bold">🎓 苏格拉底AI</a>
                    </div>
                    <div class="hidden md:ml-10 md:flex md:space-x-8">
                        <a href="/" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">首页</a>
                        <a href="/chat" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">开始学习</a>
                        <a href="/characters" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium bg-white/20">角色管理</a>
                        <a href="/materials" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">教材管理</a>
                        <a href="/backgrounds" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">背景配置</a>
                        <a href="/settings" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">设置</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">角色管理</h1>
            <button onclick="showAddModal()" class="gradient-bg text-white px-6 py-2 rounded-lg font-medium hover:opacity-90">
                + 添加角色
            </button>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="characters-grid">
            <div class="col-span-full text-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600 mx-auto"></div>
                <p class="text-gray-500 mt-4">加载中...</p>
            </div>
        </div>
    </div>

    <div id="character-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-2xl p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold text-gray-900 mb-6" id="modal-title">添加角色</h3>
            
            <form id="character-form" class="space-y-4">
                <input type="hidden" id="character-id">
                <input type="hidden" id="avatar-type" value="emoji">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">角色名称 *</label>
                    <input type="text" id="character-name" required 
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">头像类型</label>
                    <div class="flex space-x-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="avatar-type-radio" value="emoji" checked 
                                onchange="switchAvatarType('emoji')"
                                class="w-4 h-4 text-purple-600">
                            <span class="ml-2">Emoji</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="avatar-type-radio" value="image" 
                                onchange="switchAvatarType('image')"
                                class="w-4 h-4 text-purple-600">
                            <span class="ml-2">上传图片</span>
                        </label>
                    </div>
                </div>
                
                <div id="emoji-avatar-section">
                    <label class="block text-sm font-medium text-gray-700 mb-2">头像（Emoji）</label>
                    <div class="flex items-center space-x-4">
                        <input type="text" id="character-avatar" placeholder="例如：👩‍🏫、🧙‍♂️、🤖" 
                            class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"
                            oninput="updateAvatarPreview()">
                        <div id="emoji-preview" class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center text-2xl">
                            👤
                        </div>
                    </div>
                </div>
                
                <div id="image-avatar-section" style="display: none;">
                    <label class="block text-sm font-medium text-gray-700 mb-2">上传头像图片</label>
                    <div class="upload-area rounded-lg p-6 text-center cursor-pointer" 
                        onclick="document.getElementById('avatar-file').click()"
                        ondragover="handleDragOver(event)"
                        ondragleave="handleDragLeave(event)"
                        ondrop="handleDrop(event)">
                        <input type="file" id="avatar-file" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                        <div id="upload-placeholder">
                            <div class="text-4xl mb-2">📷</div>
                            <p class="text-sm text-gray-500">点击或拖拽图片到此处上传</p>
                            <p class="text-xs text-gray-400 mt-1">支持 JPG、PNG、GIF、WebP 格式，最大 10MB</p>
                        </div>
                        <div id="image-preview-container" style="display: none;">
                            <img id="image-preview" class="avatar-preview mx-auto">
                            <button type="button" onclick="clearImagePreview(event)" class="mt-2 text-sm text-red-500 hover:text-red-700">
                                更换图片
                            </button>
                        </div>
                    </div>
                    <input type="hidden" id="uploaded-image-url">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">简短描述</label>
                    <input type="text" id="character-description" placeholder="一句话介绍这个角色" 
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">性格设定 *</label>
                    <textarea id="character-personality" rows="4" required placeholder="详细描述这个角色的性格特点，例如：&#10;活泼可爱，略带碎碎念，像个元气满满的小妹妹。对学生非常热情，总是用积极的语言鼓励对方。有时候会有点小迷糊，但在教学上非常认真负责。"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">背景故事</label>
                    <textarea id="character-background" rows="3" placeholder="角色的背景故事，增加代入感，例如：&#10;你是清华大学计算机系的大一新生，和另外两位室友一起住在学校附近的公寓里。你性格活泼，是宿舍里的开心果。为了赚取生活费，你同意给隔壁的经管系学生做AI课程的家教。"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"></textarea>
                </div>
            </form>
            
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="hideModal()" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                    取消
                </button>
                <button onclick="saveCharacter()" class="px-6 py-2 gradient-bg text-white rounded-lg hover:opacity-90">
                    保存
                </button>
            </div>
        </div>
    </div>

    <div id="preset-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-2xl p-6 w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold text-gray-900 mb-6">选择预设角色</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="preset-list">
            </div>
            <div class="flex justify-end mt-6">
                <button onclick="hidePresetModal()" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                    取消
                </button>
            </div>
        </div>
    </div>

    <script>
        const presetCharacters = [

                background: "你是一位在大学教了几十年数学的教授。你见过太多学生把数学当成死记硬背的公式集合，而不理解其中的美感和逻辑。你的使命是改变这一点，让学生真正理解数学的思维方式。"

        function getAvatarDisplay(char) {
            const avatarType = char.avatar_type || 'emoji';
            const avatar = (char.avatar || '').trim();
            
            const isImagePath = (path) => {
                if (!path) return false;
                const trimmed = path.trim();
                return trimmed.startsWith('/api/uploads/') || 
                       trimmed.startsWith('/uploads/') ||
                       trimmed.startsWith('http://') ||
                       trimmed.startsWith('https://') ||
                       /\.(jpg|jpeg|png|gif|webp)$/i.test(trimmed);
            };
            
            const getImageUrl = (path) => {
                let url = path.trim();
                if (url.startsWith('/uploads/')) {
                    url = '/api' + url;
                }
                return url;
            };
            
            if (avatarType === 'image' && avatar) {
                return `<img src="${getImageUrl(avatar)}" class="w-full h-full object-cover rounded-full" alt="头像">`;
            }
            
            if (isImagePath(avatar)) {
                return `<img src="${getImageUrl(avatar)}" class="w-full h-full object-cover rounded-full" alt="头像">`;
            }
            
            return `<span class="text-2xl">${avatar || '👤'}</span>`;
        }

        async function loadCharacters() {
            try {
                const response = await fetch('/api/characters');
                const characters = await response.json();
                
                const grid = document.getElementById('characters-grid');
                if (characters.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <div class="text-6xl mb-4">🎭</div>
                            <h3 class="text-xl font-semibold text-gray-900 mb-2">暂无角色</h3>
                            <p class="text-gray-500 mb-4">点击上方按钮添加角色，或使用预设角色快速开始</p>
                            <button onclick="showPresetModal()" class="gradient-bg text-white px-6 py-2 rounded-lg hover:opacity-90">
                                使用预设角色
                            </button>
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = characters.map(char => `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex items-center space-x-3">
                                <div class="w-12 h-12 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full flex items-center justify-center overflow-hidden">
                                    ${getAvatarDisplay(char)}
                                </div>
                                <div>
                                    <h4 class="font-semibold text-gray-900">${char.name}</h4>
                                    <p class="text-sm text-gray-500">${char.description || ''}</p>
                                </div>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="editCharacter(${char.id})" class="text-gray-400 hover:text-purple-600" title="编辑">
                                    ✏️
                                </button>
                                <button onclick="deleteCharacter(${char.id})" class="text-gray-400 hover:text-red-600" title="删除">
                                    🗑️
                                </button>
                            </div>
                        </div>
                        <div class="text-sm text-gray-600 space-y-2">
                            <div>
                                <span class="font-medium">性格：</span>
                                <span class="line-clamp-2">${char.personality}</span>
                            </div>
                            ${char.background ? `
                            <div>
                                <span class="font-medium">背景：</span>
                                <span class="line-clamp-2">${char.background}</span>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
                
                if (characters.length < 3) {
                    grid.innerHTML += `
                        <div class="bg-gray-50 rounded-xl border-2 border-dashed border-gray-300 p-6 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-gray-100" onclick="showPresetModal()">
                            <div class="text-4xl mb-2">➕</div>
                            <p class="text-gray-500">使用预设角色快速添加</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载角色失败:', error);
            }
        }

        function showAddModal() {
            document.getElementById('modal-title').textContent = '添加角色';
            document.getElementById('character-id').value = '';
            document.getElementById('character-form').reset();
            document.getElementById('avatar-type').value = 'emoji';
            document.querySelector('input[name="avatar-type-radio"][value="emoji"]').checked = true;
            switchAvatarType('emoji');
            clearImagePreview();
            document.getElementById('character-modal').style.display = 'flex';
        }

        function hideModal() {
            document.getElementById('character-modal').style.display = 'none';
        }

        function switchAvatarType(type) {
            document.getElementById('avatar-type').value = type;
            if (type === 'emoji') {
                document.getElementById('emoji-avatar-section').style.display = 'block';
                document.getElementById('image-avatar-section').style.display = 'none';
            } else {
                document.getElementById('emoji-avatar-section').style.display = 'none';
                document.getElementById('image-avatar-section').style.display = 'block';
            }
        }

        function updateAvatarPreview() {
            const emoji = document.getElementById('character-avatar').value || '👤';
            document.getElementById('emoji-preview').textContent = emoji;
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.currentTarget.classList.add('dragover');
        }

        function handleDragLeave(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');
        }

        function handleDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');
            const files = event.dataTransfer.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }

        async function processFile(file) {
            const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
            if (!allowedTypes.includes(file.type)) {
                alert('不支持的图片格式。请上传 JPG、PNG、GIF 或 WebP 格式的图片。');
                return;
            }

            const maxSize = 10 * 1024 * 1024;
            if (file.size > maxSize) {
                alert('图片大小超过限制。最大允许 10MB。');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('upload-placeholder').style.display = 'none';
                document.getElementById('image-preview-container').style.display = 'block';
            };
            reader.readAsDataURL(file);

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/api/upload/avatar', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    document.getElementById('uploaded-image-url').value = result.url;
                } else {
                    const error = await response.json();
                    alert('上传失败: ' + (error.detail || '未知错误'));
                    clearImagePreview();
                }
            } catch (error) {
                console.error('上传失败:', error);
                alert('上传失败: ' + error.message);
                clearImagePreview();
            }
        }

        function clearImagePreview(event) {
            if (event) event.stopPropagation();
            document.getElementById('upload-placeholder').style.display = 'block';
            document.getElementById('image-preview-container').style.display = 'none';
            document.getElementById('uploaded-image-url').value = '';
            document.getElementById('avatar-file').value = '';
        }

        async function editCharacter(id) {
            try {
                const response = await fetch(`/api/characters/${id}`);
                const char = await response.json();
                
                document.getElementById('modal-title').textContent = '编辑角色';
                document.getElementById('character-id').value = char.id;
                document.getElementById('character-name').value = char.name;
                document.getElementById('character-avatar').value = char.avatar || '';
                document.getElementById('character-description').value = char.description || '';
                document.getElementById('character-personality').value = char.personality;
                document.getElementById('character-background').value = char.background || '';
                
                const avatarType = char.avatar_type || 'emoji';
                document.getElementById('avatar-type').value = avatarType;
                document.querySelector(`input[name="avatar-type-radio"][value="${avatarType}"]`).checked = true;
                switchAvatarType(avatarType);
                
                if (avatarType === 'emoji') {
                    updateAvatarPreview();
                } else if (char.avatar && char.avatar.startsWith('/api/')) {
                    document.getElementById('image-preview').src = char.avatar;
                    document.getElementById('uploaded-image-url').value = char.avatar;
                    document.getElementById('upload-placeholder').style.display = 'none';
                    document.getElementById('image-preview-container').style.display = 'block';
                }
                
                document.getElementById('character-modal').style.display = 'flex';
            } catch (error) {
                console.error('加载角色失败:', error);
                alert('加载角色失败');
            }
        }

        async function saveCharacter() {
            const id = document.getElementById('character-id').value;
            const avatarType = document.getElementById('avatar-type').value;
            
            let avatar;
            if (avatarType === 'image') {
                avatar = document.getElementById('uploaded-image-url').value;
                if (!avatar) {
                    alert('请上传头像图片');
                    return;
                }
            } else {
                avatar = document.getElementById('character-avatar').value.trim() || '👤';
            }
            
            const data = {
                name: document.getElementById('character-name').value.trim(),
                avatar: avatar,
                avatar_type: avatarType,
                description: document.getElementById('character-description').value.trim(),
                personality: document.getElementById('character-personality').value.trim(),
                background: document.getElementById('character-background').value.trim()
            };
            
            if (!data.name || !data.personality) {
                alert('请填写角色名称和性格设定');
                return;
            }
            
            try {
                let response;
                if (id) {
                    response = await fetch(`/api/characters/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    response = await fetch('/api/characters', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }
                
                if (response.ok) {
                    hideModal();
                    loadCharacters();
                } else {
                    alert('保存失败');
                }
            } catch (error) {
                console.error('保存失败:', error);
                alert('保存失败');
            }
        }

        async function deleteCharacter(id) {
            if (!confirm('确定要删除这个角色吗？')) return;
            
            try {
                const response = await fetch(`/api/characters/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadCharacters();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败');
            }
        }

        function showPresetModal() {
            const list = document.getElementById('preset-list');
            list.innerHTML = presetCharacters.map((char, index) => `
                <div class="border border-gray-200 rounded-lg p-4 cursor-pointer hover:border-purple-500 hover:bg-purple-50 transition-colors" onclick="addPresetCharacter(${index})">
                    <div class="flex items-center space-x-3 mb-2">
                        <div class="w-10 h-10 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full flex items-center justify-center text-xl overflow-hidden">
                            ${getAvatarDisplay(char)}
                        </div>
                        <div>
                            <h4 class="font-semibold text-gray-900">${char.name}</h4>
                            <p class="text-sm text-gray-500">${char.description}</p>
                        </div>
                    </div>
                    <p class="text-xs text-gray-600 line-clamp-2">${char.personality}</p>
                </div>
            `).join('');
            
            document.getElementById('preset-modal').style.display = 'flex';
        }

        function hidePresetModal() {
            document.getElementById('preset-modal').style.display = 'none';
        }

        async function addPresetCharacter(index) {
            const char = presetCharacters[index];
            
            try {
                const response = await fetch('/api/characters', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(char)
                });
                
                if (response.ok) {
                    hidePresetModal();
                    loadCharacters();
                } else {
                    alert('添加失败');
                }
            } catch (error) {
                console.error('添加失败:', error);
                alert('添加失败');
            }
        }

        document.addEventListener('DOMContentLoaded', loadCharacters);
    </script>
</body>
</html>
