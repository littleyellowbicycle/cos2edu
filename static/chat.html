<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习对话 - 苏格拉底AI教学系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .chat-container {
            height: calc(100vh - 200px);
        }
        .message-user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
        }
        .message-assistant {
            background: #f3f4f6;
            color: #1f2937;
        }
        .typing-indicator span {
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .chat-area-bg {
            transition: background 0.3s ease;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="gradient-bg shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <a href="/" class="text-white text-2xl font-bold">🎓 苏格拉底AI</a>
                    </div>
                    <div class="hidden md:ml-10 md:flex md:space-x-8">
                        <a href="/" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">首页</a>
                        <a href="/chat" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium bg-white/20">开始学习</a>
                        <a href="/characters" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">角色管理</a>
                        <a href="/materials" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">教材管理</a>
                        <a href="/backgrounds" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">背景配置</a>
                        <a href="/settings" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">设置</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-64px)]">
        <div class="w-72 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-200">
                <button onclick="showNewConversationModal()" class="w-full gradient-bg text-white py-3 px-4 rounded-lg font-medium hover:opacity-90 transition-opacity">
                    + 新建对话
                </button>
            </div>
            <div class="flex-1 overflow-y-auto" id="conversations-list">
                <div class="p-4 text-center text-gray-500">
                    <p>加载中...</p>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col chat-area-bg" id="chat-area" style="display: none;">
            <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full flex items-center justify-center text-xl overflow-hidden" id="current-character-avatar">
                        👩‍🏫
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-900" id="current-character-name">-</h3>
                        <p class="text-sm text-gray-500" id="current-teaching-mode">教学模式：苏格拉底式</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <select id="teaching-mode-select" class="border border-gray-300 rounded-lg px-3 py-2 text-sm" onchange="changeTeachingMode()">
                        <option value="socratic">苏格拉底式（提问引导）</option>
                        <option value="explanation">讲解式（直接解释）</option>
                        <option value="mixed">混合模式</option>
                    </select>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-6 space-y-4 chat-container" id="messages-container">
            </div>

            <div class="bg-white border-t border-gray-200 p-4">
                <div class="max-w-4xl mx-auto">
                    <div class="flex items-end space-x-4">
                        <div class="flex-1">
                            <textarea 
                                id="message-input" 
                                rows="1"
                                placeholder="输入你的回答或问题... (最多50000字符)"
                                class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent resize-none"
                                onkeydown="handleKeyDown(event)"
                                oninput="autoResize(this); updateCharCount(this)"
                                maxlength="50000"
                            ></textarea>
                            <div class="text-xs text-gray-400 mt-1 text-right" id="char-count" style="display: none;">
                                0 / 50000
                            </div>
                        </div>
                        <button 
                            id="send-button"
                            onclick="sendMessage()" 
                            class="gradient-bg text-white px-6 py-3 rounded-xl font-medium hover:opacity-90 transition-opacity disabled:opacity-50"
                        >
                            发送
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex items-center justify-center" id="welcome-area">
            <div class="text-center">
                <div class="text-8xl mb-6">🎯</div>
                <h2 class="text-3xl font-bold text-gray-900 mb-4">开始你的苏格拉底式学习</h2>
                <p class="text-gray-600 mb-8 max-w-md">
                    选择一个对话继续学习，或点击"新建对话"开始新的学习旅程
                </p>
                <button onclick="showNewConversationModal()" class="gradient-bg text-white px-8 py-4 rounded-xl font-medium hover:opacity-90 transition-opacity">
                    + 新建对话
                </button>
            </div>
        </div>
    </div>

    <div id="new-conversation-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-2xl p-6 w-full max-w-lg mx-4">
            <h3 class="text-xl font-bold text-gray-900 mb-6">新建学习对话</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">对话标题 <span class="text-gray-400 text-xs">(最多200字符)</span></label>
                    <input type="text" id="new-conversation-title" placeholder="例如：学习卷积神经网络" 
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"
                        maxlength="200">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">选择导师</label>
                    <select id="new-conversation-character" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="">加载中...</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">选择教材（可选）</label>
                    <select id="new-conversation-material" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="">不使用教材</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">教学模式</label>
                    <select id="new-conversation-mode" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="socratic">苏格拉底式（推荐，提问引导）</option>
                        <option value="explanation">讲解式（直接解释）</option>
                        <option value="mixed">混合模式</option>
                    </select>
                </div>
            </div>
            
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="hideNewConversationModal()" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                    取消
                </button>
                <button onclick="createNewConversation()" class="px-6 py-2 gradient-bg text-white rounded-lg hover:opacity-90">
                    创建
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentConversationId = null;
        let currentCharacter = null;
        let isStreaming = false;
        let currentBackgroundConfig = null;

        function getAvatarDisplay(char) {
            const avatarType = char.avatar_type || 'emoji';
            const avatar = (char.avatar || '').trim();
            
            const isImagePath = (path) => {
                if (!path) return false;
                const trimmed = path.trim();
                return trimmed.startsWith('/api/uploads/') || 
                       trimmed.startsWith('/uploads/') ||
                       trimmed.startsWith('http://') ||
                       trimmed.startsWith('https://') ||
                       /\.(jpg|jpeg|png|gif|webp)$/i.test(trimmed);
            };
            
            const getImageUrl = (path) => {
                let url = path.trim();
                if (url.startsWith('/uploads/')) {
                    url = '/api' + url;
                }
                return url;
            };
            
            if (avatarType === 'image' && avatar) {
                return `<img src="${getImageUrl(avatar)}" class="avatar-img" alt="头像">`;
            }
            
            if (isImagePath(avatar)) {
                return `<img src="${getImageUrl(avatar)}" class="avatar-img" alt="头像">`;
            }
            
            return `<span class="text-xl">${avatar || '👤'}</span>`;
        }

        function applyBackgroundConfig(bg) {
            if (!bg) return;
            const chatArea = document.getElementById('chat-area');
            const welcomeArea = document.getElementById('welcome-area');
            
            if (bg.background_type === 'image') {
                const bgStyle = `url('${bg.background_value}') center/cover no-repeat fixed`;
                chatArea.style.background = bgStyle;
                welcomeArea.style.background = bgStyle;
            } else {
                chatArea.style.background = bg.background_value;
                welcomeArea.style.background = bg.background_value;
            }
        }

        async function loadDefaultBackground() {
            try {
                const response = await fetch('/api/backgrounds/default');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const bg = await response.json();
                currentBackgroundConfig = bg;
                applyBackgroundConfig(bg);
            } catch (error) {
                console.error('加载背景配置失败:', error);
                const defaultBg = {
                    background_type: 'color',
                    background_value: '#f9fafb'
                };
                applyBackgroundConfig(defaultBg);
            }
        }

        async function loadConversations() {
            try {
                const response = await fetch('/api/conversations');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const conversations = await response.json();
                
                const list = document.getElementById('conversations-list');
                if (conversations.length === 0) {
                    list.innerHTML = `
                        <div class="p-4 text-center text-gray-500">
                            <p>暂无对话</p>
                            <p class="text-sm mt-2">点击上方按钮创建新对话</p>
                        </div>
                    `;
                    return;
                }
                
                list.innerHTML = conversations.map(conv => {
                    const title = conv.title || '新对话';
                    const charName = conv.character?.name || '未知导师';
                    const isActive = currentConversationId === conv.id;
                    return `
                        <div class="group relative conversation-item border-b border-gray-100 ${isActive ? 'bg-purple-50' : 'hover:bg-gray-50'}" 
                             data-conversation-id="${conv.id}">
                            <div class="p-3 cursor-pointer" onclick="loadConversation(${conv.id})">
                                <div class="font-medium text-gray-900 truncate conversation-title" 
                                     id="title-${conv.id}" 
                                     title="${escapeHtml(title)}">
                                    ${escapeHtml(title)}
                                </div>
                                <div class="flex items-center justify-between mt-1">
                                    <span class="text-xs text-gray-500">
                                        ${escapeHtml(charName)}
                                    </span>
                                    <span class="text-xs text-gray-400">
                                        ${formatRelativeTime(conv.updated_at)}
                                    </span>
                                </div>
                            </div>
                            <div class="absolute right-2 top-1/2 -translate-y-1/2 hidden group-hover:flex items-center space-x-1">
                                <button onclick="event.stopPropagation(); startRenameConversation(${conv.id})" 
                                        class="p-1.5 text-gray-400 hover:text-purple-600 hover:bg-purple-100 rounded" 
                                        title="重命名">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                </button>
                                <button onclick="event.stopPropagation(); deleteConversation(${conv.id})" 
                                        class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-100 rounded" 
                                        title="删除">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('加载对话失败:', error);
                const list = document.getElementById('conversations-list');
                list.innerHTML = `
                    <div class="p-4 text-center text-gray-500">
                        <p>加载失败</p>
                        <p class="text-sm mt-2">请检查服务是否正常运行</p>
                    </div>
                `;
            }
        }

        function formatRelativeTime(dateString) {
            const now = new Date();
            const date = new Date(dateString);
            const diff = now - date;
            
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            if (seconds < 60) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 7) return `${days}天前`;
            return date.toLocaleDateString('zh-CN');
        }

        async function startRenameConversation(conversationId) {
            const titleElement = document.getElementById(`title-${conversationId}`);
            if (!titleElement) return;
            
            const currentTitle = titleElement.textContent.trim();
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentTitle;
            input.className = 'w-full px-2 py-1 border border-purple-400 rounded text-sm focus:outline-none focus:ring-2 focus:ring-purple-500';
            
            const originalContent = titleElement.innerHTML;
            titleElement.innerHTML = '';
            titleElement.appendChild(input);
            input.focus();
            input.select();
            
            const finishRename = async (newTitle) => {
                if (newTitle && newTitle.trim() && newTitle.trim() !== currentTitle) {
                    try {
                        const response = await fetch(`/api/conversations/${conversationId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ title: newTitle.trim() })
                        });
                        if (response.ok) {
                            loadConversations();
                            if (currentConversationId === conversationId) {
                                loadConversation(conversationId);
                            }
                        }
                    } catch (error) {
                        console.error('重命名失败:', error);
                        titleElement.innerHTML = originalContent;
                    }
                } else {
                    titleElement.innerHTML = originalContent;
                }
            };
            
            input.addEventListener('blur', () => finishRename(input.value));
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    input.blur();
                } else if (e.key === 'Escape') {
                    titleElement.innerHTML = originalContent;
                }
            });
        }

        async function deleteConversation(conversationId) {
            if (!confirm('确定要删除这个对话吗？此操作不可撤销。')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/conversations/${conversationId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    if (currentConversationId === conversationId) {
                        currentConversationId = null;
                        document.getElementById('chat-area').style.display = 'none';
                        document.getElementById('welcome-area').style.display = 'flex';
                    }
                    loadConversations();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败: ' + error.message);
            }
        }

        async function loadCharactersForModal() {
            try {
                const response = await fetch('/api/characters');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const characters = await response.json();
                
                const select = document.getElementById('new-conversation-character');
                if (characters.length === 0) {
                    select.innerHTML = '<option value="">请先添加角色</option>';
                } else {
                    select.innerHTML = characters.map(char => 
                        `<option value="${char.id}">${char.name}</option>`
                    ).join('');
                    
                    const savedId = localStorage.getItem('selectedCharacterId');
                    if (savedId) {
                        select.value = savedId;
                    }
                }
            } catch (error) {
                console.error('加载角色失败:', error);
                const select = document.getElementById('new-conversation-character');
                select.innerHTML = '<option value="">加载失败</option>';
            }
        }

        async function loadMaterialsForModal() {
            try {
                const response = await fetch('/api/materials');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const materials = await response.json();
                
                const select = document.getElementById('new-conversation-material');
                if (materials.length === 0) {
                    select.innerHTML = '<option value="">无可用教材</option>';
                } else {
                    select.innerHTML = '<option value="">不使用教材</option>' + 
                        materials.map(mat => `<option value="${mat.id}">${mat.title}</option>`
                    ).join('');
                }
            } catch (error) {
                console.error('加载教材失败:', error);
                const select = document.getElementById('new-conversation-material');
                select.innerHTML = '<option value="">加载失败</option>';
            }
        }

        async function loadConversation(conversationId) {
            currentConversationId = conversationId;
            
            try {
                const response = await fetch(`/api/conversations/${conversationId}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const conversation = await response.json();
                
                currentCharacter = conversation.character;
                
                document.getElementById('current-character-name').textContent = conversation.character?.name || '未知';
                document.getElementById('current-character-avatar').innerHTML = getAvatarDisplay(conversation.character || {});
                document.getElementById('teaching-mode-select').value = conversation.teaching_mode;
                
                const modeText = {
                    'socratic': '教学模式：苏格拉底式',
                    'explanation': '教学模式：讲解式',
                    'mixed': '教学模式：混合模式'
                };
                document.getElementById('current-teaching-mode').textContent = modeText[conversation.teaching_mode] || '';
                
                renderMessages(conversation.messages);
                
                document.getElementById('welcome-area').style.display = 'none';
                document.getElementById('chat-area').style.display = 'flex';
                
                loadConversations();
            } catch (error) {
                console.error('加载对话失败:', error);
                alert('加载对话失败: ' + error.message);
            }
        }

        function renderMessages(messages) {
            const container = document.getElementById('messages-container');
            container.innerHTML = messages.map(msg => `
                <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[80%] rounded-2xl px-4 py-3 ${msg.role === 'user' ? 'message-user' : 'message-assistant'}">
                        <p class="whitespace-pre-wrap">${escapeHtml(msg.content)}</p>
                    </div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showNewConversationModal() {
            document.getElementById('new-conversation-modal').style.display = 'flex';
            loadCharactersForModal();
            loadMaterialsForModal();
        }

        function hideNewConversationModal() {
            document.getElementById('new-conversation-modal').style.display = 'none';
        }

        async function createNewConversation() {
            const title = document.getElementById('new-conversation-title').value || '新对话';
            const characterId = parseInt(document.getElementById('new-conversation-character').value);
            const materialId = document.getElementById('new-conversation-material').value || null;
            const mode = document.getElementById('new-conversation-mode').value;
            
            if (!characterId) {
                alert('请选择一个导师角色');
                return;
            }
            
            try {
                const response = await fetch('/api/conversations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        character_id: characterId,
                        material_id: materialId ? parseInt(materialId) : null,
                        teaching_mode: mode
                    })
                });
                
                if (response.ok) {
                    const conversation = await response.json();
                    hideNewConversationModal();
                    await loadConversations();
                    loadConversation(conversation.id);
                } else {
                    alert('创建对话失败');
                }
            } catch (error) {
                console.error('创建对话失败:', error);
                alert('创建对话失败');
            }
        }

        async function changeTeachingMode() {
            if (!currentConversationId) return;
            
            const mode = document.getElementById('teaching-mode-select').value;
            
            try {
                await fetch(`/api/conversations/${currentConversationId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teaching_mode: mode })
                });
                
                const modeText = {
                    'socratic': '教学模式：苏格拉底式',
                    'explanation': '教学模式：讲解式',
                    'mixed': '教学模式：混合模式'
                };
                document.getElementById('current-teaching-mode').textContent = modeText[mode] || '';
            } catch (error) {
                console.error('更新教学模式失败:', error);
            }
        }

        async function sendMessage() {
            if (isStreaming) return;
            
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            
            if (!content || !currentConversationId) return;
            
            input.value = '';
            autoResize(input);
            
            const container = document.getElementById('messages-container');
            container.innerHTML += `
                <div class="flex justify-end">
                    <div class="max-w-[80%] rounded-2xl px-4 py-3 message-user">
                        <p class="whitespace-pre-wrap">${escapeHtml(content)}</p>
                    </div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
            
            const assistantDiv = document.createElement('div');
            assistantDiv.className = 'flex justify-start';
            assistantDiv.innerHTML = `

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        function updateCharCount(textarea) {
            const charCount = document.getElementById('char-count');
            const maxLength = 50000;
            const currentLength = textarea.value.length;
            
            if (currentLength > 0) {
                charCount.style.display = 'block';
                charCount.textContent = `${currentLength} / ${maxLength}`;
                
                if (currentLength > maxLength * 0.9) {
                    charCount.className = 'text-xs text-red-500 mt-1 text-right';
                } else if (currentLength > maxLength * 0.7) {
                    charCount.className = 'text-xs text-amber-500 mt-1 text-right';
                } else {
                    charCount.className = 'text-xs text-gray-400 mt-1 text-right';
                }
            } else {
                charCount.style.display = 'none';
            }
        }
