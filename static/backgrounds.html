<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景配置 - 苏格拉底AI教学系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .upload-area {
            border: 2px dashed #d1d5db;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #8b5cf6;
            background-color: #f5f3ff;
        }
        .upload-area.dragover {
            border-color: #8b5cf6;
            background-color: #ede9fe;
        }
        .bg-preview {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        .bg-preview-image {
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="gradient-bg shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <a href="/" class="text-white text-2xl font-bold">🎓 苏格拉底AI</a>
                    </div>
                    <div class="hidden md:ml-10 md:flex md:space-x-8">
                        <a href="/" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">首页</a>
                        <a href="/chat" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">开始学习</a>
                        <a href="/characters" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">角色管理</a>
                        <a href="/materials" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">教材管理</a>
                        <a href="/backgrounds" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium bg-white/20">背景配置</a>
                        <a href="/settings" class="text-white hover:text-gray-200 px-3 py-2 rounded-md text-sm font-medium">设置</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">背景配置</h1>
            <button onclick="showAddModal()" class="gradient-bg text-white px-6 py-2 rounded-lg font-medium hover:opacity-90">
                + 添加背景
            </button>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="backgrounds-grid">
            <div class="col-span-full text-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600 mx-auto"></div>
                <p class="text-gray-500 mt-4">加载中...</p>
            </div>
        </div>
    </div>

    <div id="background-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-2xl p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold text-gray-900 mb-6" id="modal-title">添加背景</h3>
            
            <form id="background-form" class="space-y-4">
                <input type="hidden" id="background-id">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">背景名称 *</label>
                    <input type="text" id="background-name" required placeholder="例如：深色主题、学习空间" 
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">背景类型</label>
                    <div class="flex space-x-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="bg-type-radio" value="color" checked 
                                onchange="switchBgType('color')"
                                class="w-4 h-4 text-purple-600">
                            <span class="ml-2">纯色</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="bg-type-radio" value="image" 
                                onchange="switchBgType('image')"
                                class="w-4 h-4 text-purple-600">
                            <span class="ml-2">图片</span>
                        </label>
                    </div>
                </div>
                
                <div id="color-section">
                    <label class="block text-sm font-medium text-gray-700 mb-2">选择颜色</label>
                    <div class="flex items-center space-x-4">
                        <input type="color" id="bg-color-picker" value="#f9fafb" 
                            class="w-16 h-12 rounded cursor-pointer border border-gray-300"
                            oninput="updateColorPreview()">
                        <input type="text" id="bg-color-value" value="#f9fafb" placeholder="#ffffff"
                            class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"
                            oninput="syncColorPicker()">
                    </div>
                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">预设颜色</label>
                        <div class="grid grid-cols-6 gap-2">
                            <button type="button" onclick="setPresetColor('#f9fafb')" class="w-10 h-10 rounded-full border border-gray-300" style="background: #f9fafb;"></button>
                            <button type="button" onclick="setPresetColor('#f3f4f6')" class="w-10 h-10 rounded-full border border-gray-300" style="background: #f3f4f6;"></button>
                            <button type="button" onclick="setPresetColor('#e5e7eb')" class="w-10 h-10 rounded-full border border-gray-300" style="background: #e5e7eb;"></button>
                            <button type="button" onclick="setPresetColor('#1f2937')" class="w-10 h-10 rounded-full border border-gray-300" style="background: #1f2937;"></button>
                            <button type="button" onclick="setPresetColor('#111827')" class="w-10 h-10 rounded-full border border-gray-300" style="background: #111827;"></button>
                            <button type="button" onclick="setPresetColor('#0f172a')" class="w-10 h-10 rounded-full border border-gray-300" style="background: #0f172a;"></button>
                        </div>
                    </div>
                </div>
                
                <div id="image-section" style="display: none;">
                    <label class="block text-sm font-medium text-gray-700 mb-2">上传背景图片</label>
                    <div class="upload-area rounded-lg p-6 text-center cursor-pointer" 
                        onclick="document.getElementById('bg-image-file').click()"
                        ondragover="handleDragOver(event)"
                        ondragleave="handleDragLeave(event)"
                        ondrop="handleDrop(event)">
                        <input type="file" id="bg-image-file" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                        <div id="bg-upload-placeholder">
                            <div class="text-4xl mb-2">🖼️</div>
                            <p class="text-sm text-gray-500">点击或拖拽图片到此处上传</p>
                            <p class="text-xs text-gray-400 mt-1">支持 JPG、PNG、GIF、WebP 格式，最大 10MB</p>
                        </div>
                        <div id="bg-image-preview-container" style="display: none;">
                            <img id="bg-image-preview" class="max-h-40 mx-auto rounded-lg">
                            <button type="button" onclick="clearImagePreview(event)" class="mt-2 text-sm text-red-500 hover:text-red-700">
                                更换图片
                            </button>
                        </div>
                    </div>
                    <input type="hidden" id="uploaded-bg-url">
                </div>
                
                <div>
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="bg-is-default" class="w-4 h-4 text-purple-600">
                        <span class="ml-2 text-sm text-gray-700">设为默认背景</span>
                    </label>
                </div>
            </form>
            
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="hideModal()" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                    取消
                </button>
                <button onclick="saveBackground()" class="px-6 py-2 gradient-bg text-white rounded-lg hover:opacity-90">
                    保存
                </button>
            </div>
        </div>
    </div>

    <div id="preset-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-2xl p-6 w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold text-gray-900 mb-6">选择预设背景</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="preset-list">
            </div>
            <div class="flex justify-end mt-6">
                <button onclick="hidePresetModal()" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                    取消
                </button>
            </div>
        </div>
    </div>

    <script>
        const presetBackgrounds = [
            {
                name: "默认浅灰",
                background_type: "color",
                background_value: "#f9fafb",
                is_default: true
            },
            {
                name: "深色主题",
                background_type: "color",
                background_value: "#1f2937",
                is_default: false
            },
            {
                name: "极简白",
                background_type: "color",
                background_value: "#ffffff",
                is_default: false
            },
            {
                name: "渐变紫",
                background_type: "color",
                background_value: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
                is_default: false
            }
        ];

        function getBgPreview(bg) {
            if (bg.background_type === 'image') {
                return `<div class="bg-preview bg-preview-image" style="background-image: url('${bg.background_value}');"></div>`;
            }
            const bgValue = bg.background_value.startsWith('linear-gradient') 
                ? bg.background_value 
                : bg.background_value;
            return `<div class="bg-preview" style="background: ${bgValue};"></div>`;
        }

        async function loadBackgrounds() {
            try {
                const response = await fetch('/api/backgrounds');
                const backgrounds = await response.json();
                
                const grid = document.getElementById('backgrounds-grid');
                if (backgrounds.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <div class="text-6xl mb-4">🎨</div>
                            <h3 class="text-xl font-semibold text-gray-900 mb-2">暂无背景配置</h3>
                            <p class="text-gray-500 mb-4">点击上方按钮添加背景，或使用预设背景快速开始</p>
                            <button onclick="showPresetModal()" class="gradient-bg text-white px-6 py-2 rounded-lg hover:opacity-90">
                                使用预设背景
                            </button>
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = backgrounds.map(bg => `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                        <div class="mb-4">
                            ${getBgPreview(bg)}
                        </div>
                        <div class="flex items-center justify-between mb-2">
                            <h4 class="font-semibold text-gray-900">${bg.name}</h4>
                            ${bg.is_default ? '<span class="px-2 py-1 text-xs bg-purple-100 text-purple-700 rounded">默认</span>' : ''}
                        </div>
                        <p class="text-sm text-gray-500 mb-4">
                            ${bg.background_type === 'color' ? '纯色背景' : '图片背景'}
                        </p>
                        <div class="flex space-x-2">
                            ${!bg.is_default ? `
                            <button onclick="setAsDefault(${bg.id})" class="text-sm text-purple-600 hover:text-purple-800" title="设为默认">
                                ⭐ 设为默认
                            </button>
                            ` : ''}
                            <button onclick="editBackground(${bg.id})" class="text-sm text-gray-500 hover:text-purple-600" title="编辑">
                                ✏️
                            </button>
                            <button onclick="deleteBackground(${bg.id})" class="text-sm text-gray-500 hover:text-red-600" title="删除">
                                🗑️
                            </button>
                        </div>
                    </div>
                `).join('');
                
                if (backgrounds.length < 3) {
                    grid.innerHTML += `
                        <div class="bg-gray-50 rounded-xl border-2 border-dashed border-gray-300 p-6 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-gray-100" onclick="showPresetModal()">
                            <div class="text-4xl mb-2">➕</div>
                            <p class="text-gray-500">使用预设背景快速添加</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载背景配置失败:', error);
            }
        }

        function showAddModal() {
            document.getElementById('modal-title').textContent = '添加背景';
            document.getElementById('background-id').value = '';
            document.getElementById('background-form').reset();
            document.getElementById('bg-color-picker').value = '#f9fafb';
            document.getElementById('bg-color-value').value = '#f9fafb';
            document.querySelector('input[name="bg-type-radio"][value="color"]').checked = true;
            switchBgType('color');
            clearImagePreview();
            document.getElementById('background-modal').style.display = 'flex';
        }

        function hideModal() {
            document.getElementById('background-modal').style.display = 'none';
        }

        function switchBgType(type) {
            if (type === 'color') {
                document.getElementById('color-section').style.display = 'block';
                document.getElementById('image-section').style.display = 'none';
            } else {
                document.getElementById('color-section').style.display = 'none';
                document.getElementById('image-section').style.display = 'block';
            }
        }

        function updateColorPreview() {
            const picker = document.getElementById('bg-color-picker');
            document.getElementById('bg-color-value').value = picker.value;
        }

        function syncColorPicker() {
            const value = document.getElementById('bg-color-value').value;
            if (/^#[0-9A-Fa-f]{6}$/.test(value)) {
                document.getElementById('bg-color-picker').value = value;
            }
        }

        function setPresetColor(color) {
            document.getElementById('bg-color-picker').value = color;
            document.getElementById('bg-color-value').value = color;
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.currentTarget.classList.add('dragover');
        }

        function handleDragLeave(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');
        }

        function handleDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');
            const files = event.dataTransfer.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }

        async function processFile(file) {
            const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
            if (!allowedTypes.includes(file.type)) {
                alert('不支持的图片格式。请上传 JPG、PNG、GIF 或 WebP 格式的图片。');
                return;
            }

            const maxSize = 10 * 1024 * 1024;
            if (file.size > maxSize) {
                alert('图片大小超过限制。最大允许 10MB。');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('bg-image-preview').src = e.target.result;
                document.getElementById('bg-upload-placeholder').style.display = 'none';
                document.getElementById('bg-image-preview-container').style.display = 'block';
            };
            reader.readAsDataURL(file);

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/api/upload/background', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    document.getElementById('uploaded-bg-url').value = result.url;
                } else {
                    const error = await response.json();
                    alert('上传失败: ' + (error.detail || '未知错误'));
                    clearImagePreview();
                }
            } catch (error) {
                console.error('上传失败:', error);
                alert('上传失败: ' + error.message);
                clearImagePreview();
            }
        }

        function clearImagePreview(event) {
            if (event) event.stopPropagation();
            document.getElementById('bg-upload-placeholder').style.display = 'block';
            document.getElementById('bg-image-preview-container').style.display = 'none';
            document.getElementById('uploaded-bg-url').value = '';
            document.getElementById('bg-image-file').value = '';
        }

        async function editBackground(id) {
            try {
                const response = await fetch(`/api/backgrounds/${id}`);
                const bg = await response.json();
                
                document.getElementById('modal-title').textContent = '编辑背景';
                document.getElementById('background-id').value = bg.id;
                document.getElementById('background-name').value = bg.name;
                document.getElementById('bg-is-default').checked = bg.is_default;
                
                const typeRadio = document.querySelector(`input[name="bg-type-radio"][value="${bg.background_type}"]`);
                if (typeRadio) {
                    typeRadio.checked = true;
                }
                switchBgType(bg.background_type);
                
                if (bg.background_type === 'color') {
                    if (bg.background_value.startsWith('#')) {
                        document.getElementById('bg-color-picker').value = bg.background_value;
                        document.getElementById('bg-color-value').value = bg.background_value;
                    } else {
                        document.getElementById('bg-color-value').value = bg.background_value;
                    }
                } else if (bg.background_value && bg.background_value.startsWith('/api/')) {
                    document.getElementById('bg-image-preview').src = bg.background_value;
                    document.getElementById('uploaded-bg-url').value = bg.background_value;
                    document.getElementById('bg-upload-placeholder').style.display = 'none';
                    document.getElementById('bg-image-preview-container').style.display = 'block';
                }
                
                document.getElementById('background-modal').style.display = 'flex';
            } catch (error) {
                console.error('加载背景配置失败:', error);
                alert('加载失败');
            }
        }

        async function setAsDefault(id) {
            try {
                const response = await fetch(`/api/backgrounds/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_default: true })
                });
                
                if (response.ok) {
                    loadBackgrounds();
                } else {
                    alert('设置失败');
                }
            } catch (error) {
                console.error('设置默认背景失败:', error);
                alert('设置失败');
            }
        }

        async function saveBackground() {
            const id = document.getElementById('background-id').value;
            const bgType = document.querySelector('input[name="bg-type-radio"]:checked').value;
            
            let bgValue;
            if (bgType === 'image') {
                bgValue = document.getElementById('uploaded-bg-url').value;
                if (!bgValue) {
                    alert('请上传背景图片');
                    return;
                }
            } else {
                bgValue = document.getElementById('bg-color-value').value.trim() || '#f9fafb';
            }
            
            const data = {
                name: document.getElementById('background-name').value.trim(),
                background_type: bgType,
                background_value: bgValue,
                is_default: document.getElementById('bg-is-default').checked
            };
            
            if (!data.name) {
                alert('请填写背景名称');
                return;
            }
            
            try {
                let response;
                if (id) {
                    response = await fetch(`/api/backgrounds/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    response = await fetch('/api/backgrounds', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }
                
                if (response.ok) {
                    hideModal();
                    loadBackgrounds();
                } else {
                    alert('保存失败');
                }
            } catch (error) {
                console.error('保存失败:', error);
                alert('保存失败');
            }
        }

        async function deleteBackground(id) {
            if (!confirm('确定要删除这个背景配置吗？')) return;
            
            try {
                const response = await fetch(`/api/backgrounds/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadBackgrounds();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败');
            }
        }

        function showPresetModal() {
            const list = document.getElementById('preset-list');
            list.innerHTML = presetBackgrounds.map((bg, index) => `
                <div class="border border-gray-200 rounded-lg p-4 cursor-pointer hover:border-purple-500 hover:bg-purple-50 transition-colors" onclick="addPresetBackground(${index})">
                    <div class="mb-3">
                        ${getBgPreview(bg)}
                    </div>
                    <h4 class="font-semibold text-gray-900">${bg.name}</h4>
                    <p class="text-sm text-gray-500">
                        ${bg.background_type === 'color' ? '纯色背景' : '图片背景'}
                    </p>
                </div>
            `).join('');
            
            document.getElementById('preset-modal').style.display = 'flex';
        }

        function hidePresetModal() {
            document.getElementById('preset-modal').style.display = 'none';
        }

        async function addPresetBackground(index) {
            const bg = presetBackgrounds[index];
            
            try {
                const response = await fetch('/api/backgrounds', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bg)
                });
                
                if (response.ok) {
                    hidePresetModal();
                    loadBackgrounds();
                } else {
                    alert('添加失败');
                }
            } catch (error) {
                console.error('添加失败:', error);
                alert('添加失败');
            }
        }

        document.addEventListener('DOMContentLoaded', loadBackgrounds);
    </script>
</body>
</html>
