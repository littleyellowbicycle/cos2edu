version: '3.8'

networks:
  cos2edu-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  redis_data:

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

x-resources: &default-resources
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
    nproc: 65535

services:
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cos2edu-nginx
    ports:
      - "80:80"
    volumes:
      - ./shared/data:/usr/share/nginx/html/uploads
    depends_on:
      - backend
    networks:
      - cos2edu-network
    logging: *default-logging
    restart: unless-stopped
    profiles:
      - frontend
      - all

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cos2edu-backend
    volumes:
      - ./shared/data:/shared/data
      - ./backend/.env:/app/.env:ro
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/cos2edu.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - APP_ENV=${APP_ENV:-prod}
      - DEBUG=${DEBUG:-false}
    networks:
      - cos2edu-network
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    profiles:
      - backend
      - all

  redis:
    image: redis:7-alpine
    container_name: cos2edu-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - cos2edu-network
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    profiles:
      - redis
      - all

  postgres:
    image: postgres:16-alpine
    container_name: cos2edu-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER:-cos2edu}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-cos2edu}
    networks:
      - cos2edu-network
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    profiles:
      - postgres
      - all