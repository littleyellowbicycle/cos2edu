course:
  name: "AI 机器学习入门"
  total_days: 15
  description: "从零开始学习机器学习与深度基础的15天计划"
  phases:
    - name: "基础阶段"
      days: [1, 5]
      modules: [ml_basics, python_ml, math_review]
    - name: "进阶阶段"
      days: [6, 10]
      modules: [neural_networks, deep_learning, cv_basics]
    - name: "实战阶段"
      days: [11, 15]
      modules: [nlp_basics, project_practice]